# DK1 Security Baseline: dependabot
version: 2

updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "06:30"
    timezone: "America/New_York"
  labels:
    - "dependencies"
    - "security"
  commit-message:
    prefix: "deps(github-actions)"
