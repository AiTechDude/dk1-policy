# DK1 Security Baseline: dependency-review
name: Dependency Review

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@v5
        with:
          config-file: .github/dependency-review-config.yml
      - name: Report dependency review availability
        if: steps.dependency-review.outcome == 'failure'
        run: |
          echo "::warning::Dependency Review could not run."
          echo "::warning::Enable Dependency Graph/GHAS, then set DK1_DEPENDENCY_REVIEW_STRICT=true."
      - name: Enforce dependency review
        if: steps.dependency-review.outcome == 'failure' && vars.DK1_DEPENDENCY_REVIEW_STRICT == 'true'
        run: exit 1
